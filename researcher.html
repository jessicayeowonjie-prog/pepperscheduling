<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ── Palettes ─────────────────────────────────────────────────────────────────
const PALETTES = {
  blush: { bg:'#fbf7f4', surface:'#fffdfb', ink:'#2b2422', muted:'#7e7068', line:'#ede2db', a:'#f2d4cf', b:'#cdd6e8', c:'#e9dccb', accent:'#a4625a' },
};

// ── Date helpers ─────────────────────────────────────────────────────────────
const KO_DAYS = ['일','월','화','수','목','금','토'];
const addDays  = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const ymd      = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtKoDate = (d) => `${d.getMonth()+1}월 ${d.getDate()}일 (${KO_DAYS[d.getDay()]})`;
const fmtTime   = (h, m) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

function addMin(t, n) {
  const [h, m] = t.split(':').map(Number);
  const total  = h*60 + m + n;
  return fmtTime(Math.floor(total/60), total%60);
}

const TODAY = new Date(2026, 6, 12);
const DAY_HOURS = {
  '2026-07-12':[13,21],'2026-07-13':[9,21],'2026-07-14':[9,21],
  '2026-07-15':[9,21],'2026-07-16':[9,21],'2026-07-17':[9,21],
  '2026-07-18':[9,21],'2026-07-19':[13,21],'2026-07-20':[9,21],
  '2026-07-21':[9,21],'2026-07-22':[9,21],'2026-07-23':[9,21],
  '2026-07-24':[9,21],'2026-07-25':[9,21],
};

function buildAvailability() {
  const taken = new Set([
    '2026-07-13_10:00','2026-07-13_14:50',
    '2026-07-14_11:50','2026-07-14_16:50',
    '2026-07-15_09:55','2026-07-15_15:55',
    '2026-07-16_13:05','2026-07-17_10:50','2026-07-17_19:30',
    '2026-07-20_09:00','2026-07-20_14:00',
    '2026-07-21_11:50','2026-07-22_15:55',
    '2026-07-23_10:00','2026-07-23_18:25',
    '2026-07-24_13:05',
  ]);
  const days = [];
  for (let i = 0; i < 14; i++) {
    const d   = addDays(TODAY, i);
    const key = ymd(d);
    const hrs = DAY_HOURS[key];
    const slots = [];
    if (hrs) {
      const [startHour, endHour] = hrs;
      let h = startHour, m = 0;
      while (h * 60 + m + 40 <= endHour * 60) {
        const t = fmtTime(h, m);
        slots.push({ time: t, taken: taken.has(`${key}_${t}`) });
        m += 55;
        while (m >= 60) { m -= 60; h++; }
      }
    }
    days.push({ date: d, key, slots });
  }
  return days;
}

const AVAILABILITY = buildAvailability();
const dayByKey = (k) => AVAILABILITY.find((d) => d.key === k);


// ── StatusPill ────────────────────────────────────────────────────────────────
function StatusPill({ C, status }) {
  const map = { pending:{ bg:C.a, label:'검토 대기' }, confirmed:{ bg:C.b, label:'확정' } };
  const m   = map[status] || map.pending;
  return (
    <span style={{ fontSize:10, padding:'3px 8px', borderRadius:999, background:m.bg, color:C.ink, letterSpacing:0.3 }}>
      {m.label}
    </span>
  );
}

// ── Cell (read-only) ──────────────────────────────────────────────────────────
function Cell({ C, k, v, mono }) {
  return (
    <div style={{ background:C.surface, border:`1px solid ${C.line}`, borderRadius:10, padding:'12px 14px' }}>
      <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>{k}</div>
      <div style={{ fontSize:14, fontWeight:500, letterSpacing:-0.1, fontVariantNumeric: mono ? 'tabular-nums' : 'normal' }}>{v}</div>
    </div>
  );
}

// ── EditableCell — click to edit, Enter/blur saves ────────────────────────────
function EditableCell({ C, k, v, mono, placeholder, onChange }) {
  const [editing, setEditing] = React.useState(false);
  const [draft,   setDraft]   = React.useState(v);
  const inputRef = React.useRef(null);

  React.useEffect(() => { setDraft(v); }, [v]);
  React.useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);

  const commit = () => {
    const trimmed = (draft || '').trim();
    if (trimmed && trimmed !== v) onChange(trimmed);
    else setDraft(v);
    setEditing(false);
  };
  const cancel = () => { setDraft(v); setEditing(false); };

  return (
    <div onClick={() => !editing && setEditing(true)} style={{
      background:C.surface, border:`1px solid ${editing ? C.ink : C.line}`, borderRadius:10,
      padding:'12px 14px', cursor: editing ? 'text' : 'pointer',
      transition:'border-color 120ms',
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:11, color:C.muted, marginBottom:4 }}>
        <span>{k}</span>
        {!editing && <span style={{ fontSize:10, opacity:0.6 }}>✎ 수정</span>}
      </div>
      {editing ? (
        <input ref={inputRef} value={draft || ''} placeholder={placeholder}
          onChange={(e) => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={(e) => { if (e.key==='Enter') { e.preventDefault(); commit(); } if (e.key==='Escape') { e.preventDefault(); cancel(); } }}
          style={{
            width:'100%', background:'transparent', border:'none', outline:'none',
            padding:0, margin:0, color:C.ink,
            fontFamily:'inherit', fontSize:14, fontWeight:500, letterSpacing:-0.1,
            fontVariantNumeric: mono ? 'tabular-nums' : 'normal',
          }}
        />
      ) : (
        <div style={{ fontSize:14, fontWeight:500, letterSpacing:-0.1, fontVariantNumeric: mono ? 'tabular-nums' : 'normal', color: v ? C.ink : C.muted }}>
          {v || placeholder}
        </div>
      )}
    </div>
  );
}

// ── DeleteRequestButton — two-step confirm ────────────────────────────────────
function DeleteRequestButton({ C, onDelete }) {
  const [confirming, setConfirming] = React.useState(false);
  const timerRef = React.useRef(null);

  React.useEffect(() => {
    if (!confirming) return;
    timerRef.current = setTimeout(() => setConfirming(false), 4000);
    return () => clearTimeout(timerRef.current);
  }, [confirming]);

  if (!confirming) {
    return (
      <button onClick={() => setConfirming(true)} title="이 신청 건 삭제" style={{
        padding:'9px 10px', borderRadius:999, background:'transparent',
        border:`1px solid ${C.line}`, color:C.muted,
        fontFamily:'inherit', fontSize:12, cursor:'pointer',
        display:'inline-flex', alignItems:'center', gap:6, marginLeft:4,
      }}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
        </svg>
        삭제
      </button>
    );
  }
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:6, marginLeft:4,
      padding:'3px 4px 3px 12px', borderRadius:999,
      background:C.bg, border:`1px solid ${C.accent}`,
    }}>
      <span style={{ fontSize:11, color:C.accent, fontWeight:500 }}>정말 삭제할까요?</span>
      <button onClick={() => { setConfirming(false); onDelete(); }} style={{
        padding:'5px 12px', borderRadius:999, background:C.accent, color:'#fff',
        border:'none', fontFamily:'inherit', fontSize:11, fontWeight:500, cursor:'pointer',
      }}>삭제</button>
      <button onClick={() => setConfirming(false)} style={{
        padding:'5px 10px', borderRadius:999, background:'transparent',
        color:C.muted, border:'none', fontFamily:'inherit', fontSize:11, cursor:'pointer',
      }}>취소</button>
    </span>
  );
}

// ── SessionEditorRow ──────────────────────────────────────────────────────────
function SessionEditorRow({ C, session, index, dot, onChange, isFirst }) {
  const availableDays  = AVAILABILITY.filter((d) => d.slots.some((s) => !s.taken));
  const currentDay     = dayByKey(session.key);
  const availableTimes = currentDay
    ? currentDay.slots.filter((s) => !s.taken || s.time === session.time)
    : [];

  const selectStyle = {
    background:C.bg, border:`1px solid ${C.line}`, borderRadius:8,
    padding:'8px 12px', fontFamily:'inherit', fontSize:13, color:C.ink,
    fontVariantNumeric:'tabular-nums', cursor:'pointer', outline:'none',
    appearance:'none',
    backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='${encodeURIComponent(C.muted)}' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>")`,
    backgroundRepeat:'no-repeat', backgroundPosition:'right 12px center', paddingRight:30,
  };

  return (
    <div style={{
      display:'grid', gridTemplateColumns:'32px 1fr 200px 80px', gap:16, alignItems:'center',
      padding:'10px 0', borderTop: !isFirst ? `1px solid ${C.line}` : 'none',
    }}>
      {dot}
      <select value={session.key}
        onChange={(e) => {
          const newDay  = dayByKey(e.target.value);
          const firstFree = newDay?.slots.find((s) => !s.taken);
          onChange({ key: e.target.value, time: firstFree ? firstFree.time : session.time });
        }}
        style={selectStyle}>
        {availableDays.map((d) => (
          <option key={d.key} value={d.key}>{fmtKoDate(d.date)}</option>
        ))}
      </select>
      <select value={session.time} onChange={(e) => onChange({ time: e.target.value })} style={selectStyle}>
        {availableTimes.map((s) => (
          <option key={s.time} value={s.time}>{s.time} – {addMin(s.time, 40)}</option>
        ))}
      </select>
      <div style={{ fontSize:11, color:C.muted, textAlign:'right' }}>실험실 B3</div>
    </div>
  );
}

// ── SessionsBlock ─────────────────────────────────────────────────────────────
function SessionsBlock({ C, current, patchCurrent }) {
  const [editing, setEditing] = React.useState(false);
  const [draft,   setDraft]   = React.useState(current.sessions);

  React.useEffect(() => { setDraft(current.sessions); }, [current.id, current.sessions]);

  const startEdit = () => { setDraft(current.sessions); setEditing(true); };
  const cancel    = () => { setDraft(current.sessions); setEditing(false); };
  const save      = () => { patchCurrent({ sessions: draft }); setEditing(false); };

  const updateSession = (idx, patch) =>
    setDraft(draft.map((s, i) => i === idx ? { ...s, ...patch } : s));

  const validationError = React.useMemo(() => {
    if (!editing) return null;
    for (let i = 0; i < draft.length; i++) {
      if (!draft[i].key || !draft[i].time) return '날짜와 시간을 모두 선택해 주세요.';
      for (let j = i + 1; j < draft.length; j++) {
        if (draft[i].key === draft[j].key) return '같은 날짜에 두 세션을 배치할 수 없습니다.';
      }
    }
    return null;
  }, [editing, draft]);

  const sessions = editing ? draft : current.sessions;

  return (
    <section style={{
      background:C.surface, border:`1px solid ${editing ? C.ink : C.line}`, borderRadius:12,
      padding:'18px 22px', marginBottom:18, transition:'border-color 160ms',
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:12 }}>
        <div style={{ fontSize:13, fontWeight:500 }}>요청한 세션 · 3회</div>
        {!editing ? (
          <button onClick={startEdit} style={{
            background:'transparent', border:`1px solid ${C.line}`, color:C.ink,
            borderRadius:999, padding:'5px 12px', fontFamily:'inherit', fontSize:11,
            cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6,
          }}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
            세션 수정
          </button>
        ) : (
          <div style={{ fontSize:11, color:C.muted }}>참여자의 일정 변경 요청을 반영합니다</div>
        )}
      </div>

      {sessions.map((s, i) => {
        const dot = (
          <span style={{
            width:22, height:22, borderRadius:11,
            background: i===0 ? C.a : i===1 ? C.b : C.c,
            display:'inline-flex', alignItems:'center', justifyContent:'center',
            fontSize:11, fontWeight:500, flexShrink:0,
          }}>{i+1}</span>
        );
        if (editing) {
          return (
            <SessionEditorRow key={i} C={C} session={s} index={i} dot={dot}
              onChange={(patch) => updateSession(i, patch)} isFirst={i===0} />
          );
        }
        const d = dayByKey(s.key);
        return (
          <div key={i} style={{
            display:'grid', gridTemplateColumns:'32px 1fr 200px 80px', gap:16, alignItems:'center',
            padding:'12px 0', borderTop: i>0 ? `1px solid ${C.line}` : 'none',
          }}>
            {dot}
            <div style={{ fontSize:14, fontVariantNumeric:'tabular-nums' }}>{d ? fmtKoDate(d.date) : s.key}</div>
            <div style={{ fontSize:13, color:C.muted, fontVariantNumeric:'tabular-nums' }}>{s.time} – {addMin(s.time,40)}</div>
            <div style={{ fontSize:11, color:C.muted, textAlign:'right' }}>실험실 B3</div>
          </div>
        );
      })}

      {editing && (
        <div style={{
          marginTop:14, paddingTop:14, borderTop:`1px solid ${C.line}`,
          display:'flex', justifyContent:'space-between', alignItems:'center', gap:12,
        }}>
          <div style={{ fontSize:12, color: validationError ? C.accent : C.muted, minHeight:18 }}>
            {validationError || '시간대는 원래 가능 시간 내에서만 선택할 수 있습니다.'}
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={cancel} style={{
              background:'transparent', border:`1px solid ${C.line}`, color:C.ink,
              borderRadius:999, padding:'7px 14px', fontFamily:'inherit', fontSize:12, cursor:'pointer',
            }}>취소</button>
            <button onClick={save} disabled={!!validationError} style={{
              background:C.ink, color:C.surface, border:'none',
              borderRadius:999, padding:'7px 16px', fontFamily:'inherit', fontSize:12, fontWeight:500,
              cursor: validationError ? 'not-allowed' : 'pointer',
              opacity: validationError ? 0.4 : 1,
            }}>변경 저장</button>
          </div>
        </div>
      )}
    </section>
  );
}

// ── Sheets API ────────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXdMr1XaCuQx-1__vtkTg3cExBkBApYNCXkFP_mExkqOeE-TCS-odbqrTuWB_-vaea/exec';

async function apiGet() {
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 12000);
    const res  = await fetch(`${SCRIPT_URL}?t=${Date.now()}`, { signal: ctrl.signal });
    clearTimeout(tid);
    return await res.json();
  } catch(e) { return null; }
}

async function apiPost(data) {
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data),
    });
  } catch(e) {}
}

// ── TabNav ────────────────────────────────────────────────────────────────────
function TabNav({ C, view, setView }) {
  return (
    <div style={{ display:'flex', borderBottom:`1px solid ${C.line}`, padding:'0 24px', background:C.surface, flexShrink:0 }}>
      {[['inbox','신청 목록'],['calendar','일정 관리']].map(([v, label]) => (
        <button key={v} onClick={() => setView(v)} style={{
          padding:'9px 16px', border:'none', background:'transparent',
          fontFamily:'inherit', fontSize:12, cursor:'pointer',
          color: view===v ? C.ink : C.muted, fontWeight: view===v ? 500 : 400,
          borderBottom: view===v ? `2px solid ${C.ink}` : '2px solid transparent',
          marginBottom:-1, letterSpacing:0.1,
        }}>{label}</button>
      ))}
    </div>
  );
}

// ── DayCard (calendar view helper) ───────────────────────────────────────────
function DayCard({ C, day, slotMap, closedSlots, toggleSlot, openedSlots, toggleOpenSlot, customSlots, addCustomSlot, removeCustomSlot }) {
  const dow = KO_DAYS[day.date.getDay()];
  const [adding,  setAdding]  = React.useState(false);
  const [newTime, setNewTime] = React.useState('');
  const inputRef = React.useRef(null);
  React.useEffect(() => { if (adding) inputRef.current?.focus(); }, [adding]);

  const confirmAdd = () => {
    if (newTime) {
      const taken = [...day.slots, ...customSlots.filter((s) => s.key === day.key)];
      if (!taken.some((s) => s.time === newTime)) addCustomSlot({ key: day.key, time: newTime });
    }
    setNewTime(''); setAdding(false);
  };

  const dayCustom = customSlots.filter((s) => s.key === day.key);
  const allSlots  = [
    ...day.slots,
    ...dayCustom.map((s) => ({ time: s.time, taken: false, isCustom: true })),
  ].sort((a, b) => a.time.localeCompare(b.time));

  return (
    <div style={{ border:`1px solid ${C.line}`, borderRadius:8, overflow:'hidden', fontSize:10 }}>
      <div style={{
        padding:'5px 8px', background:C.surface, borderBottom:`1px solid ${C.line}`,
        fontWeight:500, display:'flex', justifyContent:'space-between', fontSize:11,
      }}>
        <span>{day.date.getMonth()+1}/{day.date.getDate()}</span>
        <span style={{ color:C.muted }}>{dow}</span>
      </div>
      <div style={{ padding:3, display:'flex', flexDirection:'column', gap:2 }}>
        {allSlots.map((slot) => {
          const k            = `${day.key}_${slot.time}`;
          const bookings     = slotMap[k] || [];
          const hasBooking   = bookings.length > 0;
          const allConfirmed = hasBooking && bookings.every((r) => r.status === 'confirmed');
          const isOpened     = openedSlots.includes(k);
          const isClosed     = closedSlots.includes(k);
          const isPreset     = slot.taken && !isOpened && !hasBooking;
          const isCustom     = slot.isCustom;

          let bg, color, borderColor, cursor, title;
          if (hasBooking) {
            bg = allConfirmed ? C.b : C.a; color = C.ink; borderColor = 'transparent';
            cursor = 'default'; title = bookings.map((r) => r.name).join(', ');
          } else if (isPreset) {
            bg = '#ddd7d3'; color = C.muted; borderColor = 'transparent';
            cursor = 'pointer'; title = '클릭하여 개방';
          } else if (isClosed) {
            bg = C.ink; color = C.surface; borderColor = 'transparent';
            cursor = 'pointer'; title = '클릭하여 차단 해제';
          } else {
            bg = isCustom ? C.surface : 'transparent';
            color = C.ink; borderColor = C.line;
            cursor = 'pointer'; title = isCustom ? '직접 추가한 슬롯 · 클릭하여 차단' : '클릭하여 차단';
          }

          const handleClick = () => {
            if (hasBooking) return;
            if (isPreset || isOpened) return toggleOpenSlot(k);
            toggleSlot(k);
          };

          return (
            <div key={slot.time} style={{ display:'flex', alignItems:'stretch', gap:1 }}>
              <button onClick={handleClick} title={title} style={{
                flex:1, textAlign:'left', padding:'3px 5px', borderRadius:3,
                border:`1px solid ${borderColor}`, background:bg, color, cursor,
                fontFamily:'inherit', fontSize:10, lineHeight:1.4,
                display:'flex', justifyContent:'space-between', alignItems:'center', gap:2,
              }}>
                <span style={{ fontVariantNumeric:'tabular-nums', flexShrink:0 }}>{slot.time}</span>
                {hasBooking && (
                  <span style={{ opacity:0.75, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth: isCustom ? 44 : 56 }}>
                    {bookings.map((r) => r.name).join('/')}
                  </span>
                )}
                {isClosed  && <span style={{ opacity:0.6, flexShrink:0 }}>✕</span>}
                {isOpened  && <span style={{ opacity:0.6, flexShrink:0, fontSize:9 }}>↩</span>}
              </button>
              {isCustom && !hasBooking && (
                <button onClick={() => removeCustomSlot(day.key, slot.time)} title="슬롯 삭제" style={{
                  padding:'0 5px', background:'transparent', border:'none',
                  color:C.muted, cursor:'pointer', fontSize:9, flexShrink:0,
                }}>✕</button>
              )}
            </div>
          );
        })}

        {allSlots.length === 0 && (
          <div style={{ padding:'4px 5px', color:C.muted, fontStyle:'italic' }}>슬롯 없음</div>
        )}

        {adding ? (
          <div style={{ display:'flex', gap:2, padding:'2px 3px', alignItems:'center', marginTop:1 }}>
            <input ref={inputRef} type="time" value={newTime}
              onChange={(e) => setNewTime(e.target.value)}
              onKeyDown={(e) => { if (e.key==='Enter') confirmAdd(); if (e.key==='Escape') { setAdding(false); setNewTime(''); } }}
              style={{
                flex:1, fontSize:10, border:`1px solid ${C.ink}`, borderRadius:3,
                padding:'3px 4px', fontFamily:'inherit', background:C.bg, color:C.ink, outline:'none',
              }} />
            <button onClick={confirmAdd} style={{
              padding:'3px 6px', fontSize:9, borderRadius:3, border:'none',
              background:C.ink, color:C.surface, cursor:'pointer', flexShrink:0,
            }}>추가</button>
            <button onClick={() => { setAdding(false); setNewTime(''); }} style={{
              padding:'3px 5px', fontSize:9, borderRadius:3, background:'transparent',
              border:`1px solid ${C.line}`, color:C.muted, cursor:'pointer', flexShrink:0,
            }}>✕</button>
          </div>
        ) : (
          <button onClick={() => setAdding(true)} style={{
            width:'100%', padding:'3px 5px', background:'transparent',
            border:`1px dashed ${C.line}`, borderRadius:3,
            color:C.muted, fontSize:10, cursor:'pointer', fontFamily:'inherit',
            textAlign:'center', marginTop:1,
          }}>+ 슬롯 추가</button>
        )}
      </div>
    </div>
  );
}

// ── CalendarView ──────────────────────────────────────────────────────────────
function CalendarView({ C, reqs, closedSlots, toggleSlot, openedSlots, toggleOpenSlot, customSlots, addCustomSlot, removeCustomSlot }) {
  const slotMap = React.useMemo(() => {
    const map = {};
    reqs.forEach((r) => {
      (r.sessions || []).forEach((s) => {
        const k = `${s.key}_${s.time}`;
        if (!map[k]) map[k] = [];
        map[k].push(r);
      });
    });
    return map;
  }, [reqs]);

  const weeks = [AVAILABILITY.slice(0, 7), AVAILABILITY.slice(7)];

  const legendItems = [
    [C.bg, C.line, '가능 (클릭 → 차단)'],
    [C.a, 'transparent', '신청(대기)'],
    [C.b, 'transparent', '신청(확정)'],
    ['#ddd7d3', 'transparent', '기본 차단 (클릭 → 개방)'],
    [C.ink, 'transparent', '직접 차단 (클릭 → 해제)'],
  ];

  return (
    <div style={{ flex:1, overflow:'auto', padding:'14px 20px 20px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12, flexWrap:'wrap' }}>
        <span style={{ fontSize:11, color:C.muted, letterSpacing:0.8, textTransform:'uppercase', flexShrink:0 }}>범례</span>
        {legendItems.map(([bg, border, label]) => (
          <span key={label} style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, color:C.muted }}>
            <span style={{ width:11, height:11, borderRadius:2, background:bg, border:`1px solid ${border}`, display:'inline-block', flexShrink:0 }} />
            {label}
          </span>
        ))}
      </div>

      {weeks.map((week, wi) => (
        <div key={wi} style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:6, marginBottom:6 }}>
          {week.map((day) => (
            <DayCard key={day.key} C={C} day={day} slotMap={slotMap}
                     closedSlots={closedSlots} toggleSlot={toggleSlot}
                     openedSlots={openedSlots} toggleOpenSlot={toggleOpenSlot}
                     customSlots={customSlots} addCustomSlot={addCustomSlot} removeCustomSlot={removeCustomSlot} />
          ))}
        </div>
      ))}
    </div>
  );
}

// ── ResearcherInbox ───────────────────────────────────────────────────────────
function ResearcherInbox() {
  const C = PALETTES.blush;

  // ── All hooks first ──────────────────────────────────────────────────────────
  const [reqs,         setReqsRaw]      = React.useState([]);
  const [active,       setActive]       = React.useState(null);
  const [loading,      setLoading]      = React.useState(true);
  const [view,         setView]         = React.useState('inbox');
  const [showDeleted,  setShowDeleted]  = React.useState(false);
  const [deletedItems, setDeletedItems] = React.useState([]);
  const [closedSlots,  setClosedSlotsRaw] = React.useState([]);
  const [openedSlots,  setOpenedSlotsRaw] = React.useState([]);
  const [customSlots,  setCustomSlotsRaw] = React.useState([]);
  const [apiError,     setApiError]       = React.useState(null);

  // ── Initial load from Sheets ─────────────────────────────────────────────────
  React.useEffect(() => {
    apiGet().then(data => {
      if (!data) {
        setApiError('서버에 연결할 수 없습니다. Apps Script가 올바르게 배포되어 있는지 확인하세요.');
      } else if (data.error) {
        setApiError(`서버 오류: ${data.error}`);
      } else {
        const live = (data.submissions || []).filter(s => !s.deleted);
        const gone = (data.submissions || []).filter(s => s.deleted);
        setReqsRaw(live);
        setDeletedItems(gone);
        setActive(live[0]?.id ?? null);
        setClosedSlotsRaw(data.config?.closedSlots || []);
        setOpenedSlotsRaw(data.config?.openedSlots || []);
        setCustomSlotsRaw(data.config?.customSlots || []);
      }
      setLoading(false);
    });
  }, []);

  // ── Poll every 8 s for new participant submissions ───────────────────────────
  React.useEffect(() => {
    const poll = async () => {
      const data = await apiGet();
      if (!data || data.error) return;
      const serverLive = (data.submissions || []).filter(s => !s.deleted);
      const serverGone = (data.submissions || []).filter(s => s.deleted);
      setReqsRaw(prev => {
        const prevMap = new Map(prev.map(r => [r.id, r]));
        return serverLive.map(s => prevMap.get(s.id) || s);
      });
      setDeletedItems(serverGone);
    };
    const id = setInterval(poll, 8000);
    return () => clearInterval(id);
  }, []);

  React.useEffect(() => {
    if (!reqs.find((r) => r.id === active)) setActive(reqs[0]?.id ?? null);
  }, [reqs, active]);

  const current = reqs.find((r) => r.id === active) || reqs[0];

  // ── Mutations (optimistic UI + background POST to Sheets) ────────────────────
  const setStatus = (id, status) => {
    setReqsRaw(prev => prev.map(r => r.id===id ? { ...r, status } : r));
    apiPost({ action: 'update', id, field: 'status', value: status });
  };
  const patchCurrent = (patch) => {
    setReqsRaw(prev => prev.map(r => r.id===active ? { ...r, ...patch } : r));
    Object.entries(patch).forEach(([field, value]) =>
      apiPost({ action: 'update', id: active, field, value: Array.isArray(value) ? JSON.stringify(value) : value })
    );
  };
  const deleteCurrent = () => {
    const tid = active;
    setReqsRaw(prev => {
      const item = prev.find(r => r.id === tid);
      if (item) setDeletedItems(di => [item, ...di]);
      return prev.filter(r => r.id !== tid);
    });
    apiPost({ action: 'delete', id: tid });
  };
  const restoreItem = (item) => {
    setDeletedItems(prev => prev.filter(i => i.id !== item.id));
    setReqsRaw(prev => [item, ...prev]);
    setActive(item.id);
    apiPost({ action: 'restore', id: item.id });
  };

  // ── Slot config mutations ────────────────────────────────────────────────────
  const toggleSlot = (k) => {
    const next = closedSlots.includes(k) ? closedSlots.filter(s => s !== k) : [...closedSlots, k];
    setClosedSlotsRaw(next);
    apiPost({ action: 'setConfig', config: { closedSlots: next, openedSlots, customSlots } });
  };
  const toggleOpenSlot = (k) => {
    const next = openedSlots.includes(k) ? openedSlots.filter(s => s !== k) : [...openedSlots, k];
    setOpenedSlotsRaw(next);
    apiPost({ action: 'setConfig', config: { closedSlots, openedSlots: next, customSlots } });
  };
  const addCustomSlot = (slot) => {
    if (customSlots.find(s => s.key === slot.key && s.time === slot.time)) return;
    const next = [...customSlots, slot];
    setCustomSlotsRaw(next);
    apiPost({ action: 'setConfig', config: { closedSlots, openedSlots, customSlots: next } });
  };
  const removeCustomSlot = (key, time) => {
    const next = customSlots.filter(s => !(s.key === key && s.time === time));
    setCustomSlotsRaw(next);
    apiPost({ action: 'setConfig', config: { closedSlots, openedSlots, customSlots: next } });
  };

  const frame = {
    width:1200, height:820, background:C.bg, color:C.ink,
    fontFamily:'"Inter","Helvetica Neue",system-ui,sans-serif',
    display:'flex', flexDirection:'column',
    borderRadius:12, overflow:'hidden',
    boxShadow:'0 1px 0 rgba(0,0,0,0.04), 0 24px 60px -30px rgba(0,0,0,0.18)',
  };

  if (loading) return (
    <div style={frame}>
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:C.muted, fontSize:14 }}>
        데이터를 불러오는 중…
      </div>
    </div>
  );

  if (apiError) return (
    <div style={frame}>
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:14, padding:40 }}>
        <div style={{ fontSize:13, fontWeight:500, color:C.accent }}>연결 오류</div>
        <div style={{ fontSize:13, color:C.muted, textAlign:'center', maxWidth:480, lineHeight:1.75 }}>{apiError}</div>
        <div style={{ fontSize:11, color:C.muted, background:C.surface, border:`1px solid ${C.line}`, borderRadius:8, padding:'8px 14px', fontVariantNumeric:'tabular-nums', wordBreak:'break-all', maxWidth:540 }}>
          {SCRIPT_URL}
        </div>
        <button onClick={() => window.location.reload()} style={{
          marginTop:4, padding:'9px 20px', borderRadius:999,
          background:C.ink, color:C.surface, border:'none',
          fontFamily:'inherit', fontSize:12, fontWeight:500, cursor:'pointer',
        }}>다시 시도</button>
      </div>
    </div>
  );

  return (
    <div style={frame}>
      <Header C={C} reqs={reqs} />
      <TabNav C={C} view={view} setView={setView} />

      {view === 'calendar' ? (
        <CalendarView C={C} reqs={reqs} closedSlots={closedSlots} toggleSlot={toggleSlot}
                      openedSlots={openedSlots} toggleOpenSlot={toggleOpenSlot}
                      customSlots={customSlots} addCustomSlot={addCustomSlot} removeCustomSlot={removeCustomSlot} />
      ) : !current ? (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ textAlign:'center', maxWidth:320 }}>
            <div style={{ fontSize:11, letterSpacing:1.2, color:C.muted, textTransform:'uppercase', marginBottom:10 }}>받은편지함</div>
            <div style={{ fontSize:18, fontWeight:500, marginBottom:6 }}>대기 중인 신청이 없습니다</div>
            <div style={{ fontSize:13, color:C.muted, lineHeight:1.6 }}>새 참여자 신청이 접수되면 이곳에 표시됩니다.</div>
          </div>
        </div>
      ) : (
        <div style={{ flex:1, display:'grid', gridTemplateColumns:'320px 1fr', minHeight:0 }}>
          {/* List */}
          <aside style={{ borderRight:`1px solid ${C.line}`, overflow:'auto', background:C.surface, display:'flex', flexDirection:'column' }}>
            <div style={{ padding:'16px 18px 8px', fontSize:11, color:C.muted, letterSpacing:1.2, textTransform:'uppercase' }}>새 신청</div>
            <div style={{ flex:1 }}>
              {reqs.map((r) => {
                const isActive  = r.id === active;
                const earliest  = r.sessions?.[0];
                if (!earliest) return null;
                const firstDay  = dayByKey(earliest.key);
                return (
                  <button key={r.id} onClick={() => setActive(r.id)} style={{
                    width:'100%', textAlign:'left', padding:'14px 18px',
                    background: isActive ? C.bg : 'transparent', border:'none',
                    borderLeft: isActive ? `2px solid ${C.ink}` : '2px solid transparent',
                    borderBottom:`1px solid ${C.line}`,
                    cursor:'pointer', fontFamily:'inherit', color:C.ink,
                    display:'flex', flexDirection:'column', gap:6,
                  }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                      <span style={{ fontSize:13, fontWeight:500 }}>{r.name}</span>
                      <StatusPill C={C} status={r.status} />
                    </div>
                    <div style={{ fontSize:12, color:C.muted, fontVariantNumeric:'tabular-nums' }}>
                      {r.pid || '—'} · 첫 세션 {firstDay ? fmtKoDate(firstDay.date) : earliest.key} {earliest.time}
                    </div>
                    <div style={{ fontSize:11, color:C.muted, fontVariantNumeric:'tabular-nums' }}>접수 {r.submittedAt}</div>
                  </button>
                );
              })}
            </div>

            {/* Deleted items section */}
            {deletedItems.length > 0 && (
              <div style={{ borderTop:`1px solid ${C.line}`, flexShrink:0 }}>
                <button onClick={() => setShowDeleted((v) => !v)} style={{
                  width:'100%', textAlign:'left', padding:'10px 18px',
                  background:'transparent', border:'none', cursor:'pointer',
                  fontFamily:'inherit', fontSize:11, color:C.muted,
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                }}>
                  <span>삭제된 항목 ({deletedItems.length})</span>
                  <span>{showDeleted ? '▲' : '▼'}</span>
                </button>
                {showDeleted && deletedItems.map((item) => (
                  <div key={item.id} style={{
                    padding:'10px 18px', borderTop:`1px solid ${C.line}`,
                    display:'flex', justifyContent:'space-between', alignItems:'center',
                    background:C.bg,
                  }}>
                    <div>
                      <div style={{ fontSize:12, fontWeight:500, color:C.ink }}>{item.name}</div>
                      <div style={{ fontSize:11, color:C.muted }}>{item.submittedAt}</div>
                    </div>
                    <button onClick={() => restoreItem(item)} style={{
                      padding:'4px 10px', borderRadius:999, fontSize:11,
                      background:'transparent', border:`1px solid ${C.line}`,
                      color:C.ink, fontFamily:'inherit', cursor:'pointer',
                    }}>복원</button>
                  </div>
                ))}
              </div>
            )}
          </aside>

          {/* Detail */}
          <main style={{ padding:'28px 36px 32px', overflow:'auto' }}>
            <div style={{ fontSize:11, color:C.muted, letterSpacing:1.2, textTransform:'uppercase', marginBottom:6 }}>
              새 일정 신청 · {current.id}
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:22 }}>
              <h2 style={{ fontSize:24, fontWeight:500, margin:0, letterSpacing:-0.2 }}>
                {current.name}님의 세션 신청
              </h2>
              <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                {current.status === 'pending' ? (
                  <>
                    <button onClick={() => setStatus(current.id, 'confirmed')} style={{
                      padding:'9px 16px', borderRadius:999, background:C.ink, color:C.surface,
                      border:'none', fontFamily:'inherit', fontSize:12, fontWeight:500, cursor:'pointer',
                    }}>확정으로 변경</button>
                    <button style={{
                      padding:'9px 14px', borderRadius:999, background:'transparent',
                      border:`1px solid ${C.line}`, color:C.ink, fontFamily:'inherit', fontSize:12, cursor:'pointer',
                    }}>일정 변경 요청</button>
                  </>
                ) : (
                  <span style={{ fontSize:12, color:C.muted }}>{current.submittedAt.slice(5)}에 확정됨</span>
                )}
                <DeleteRequestButton C={C} onDelete={deleteCurrent} />
              </div>
            </div>

            <section style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:22 }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:12 }}>
                <Cell C={C} k="이름" v={current.name} />
                <Cell C={C} k="생년월일" v={current.dob ? current.dob.slice(0,10) : '—'} />
                <Cell C={C} k="휴대전화" v={current.phone} mono />
                <Cell C={C} k="계좌번호" v={current.account || '—'} mono />
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 3fr', gap:12 }}>
                <EditableCell C={C} k="참여자 ID" v={current.pid} mono placeholder="P-000"
                              onChange={(v) => patchCurrent({ pid: v })} />
              </div>
            </section>

            <SessionsBlock C={C} current={current} patchCurrent={patchCurrent} />

            {/* SMS template */}
            <section style={{ background:C.bg, border:`1px dashed ${C.line}`, borderRadius:12, padding:'16px 20px' }}>
              <div style={{ fontSize:11, color:C.muted, letterSpacing:1.2, textTransform:'uppercase', marginBottom:8 }}>
                발송할 문자 미리보기
              </div>
              <div style={{ fontSize:13, lineHeight:1.7, color:C.ink }}>
                [Pepper Study] {current.name}님, 신청해 주신 3개 세션이 확정되었습니다.<br />
                {current.sessions.map((s, i) => {
                  const d = dayByKey(s.key);
                  return <span key={i}>· {d ? fmtKoDate(d.date) : s.key} {s.time}<br /></span>;
                })}
                장소: 실험실 B3 · 변경 시 회신 부탁드립니다.
              </div>
            </section>
          </main>
        </div>
      )}
    </div>
  );
}

function Header({ C, reqs }) {
  return (
    <header style={{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'14px 24px', borderBottom:`1px solid ${C.line}`,
      background:C.surface, fontSize:12, color:C.muted,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:18, height:18, borderRadius:4, background:`linear-gradient(135deg, ${C.a}, ${C.b})`, border:`1px solid ${C.line}` }} />
        <span style={{ color:C.ink, fontWeight:500 }}>Pepper Study</span>
        <span style={{ color:C.muted }}>· 연구자 받은편지함</span>
      </div>
      <div style={{ display:'flex', gap:16, alignItems:'center' }}>
        <span>대기 {reqs.filter((r) => r.status==='pending').length}</span>
        <span>확정 {reqs.filter((r) => r.status==='confirmed').length}</span>
        <a href="index.html" style={{ fontSize:11, color:C.muted, textDecoration:'none', marginLeft:8 }}>← 참여자 화면</a>
      </div>
    </header>
  );
}

// ── Scaled viewport wrapper ───────────────────────────────────────────────────
function App() {
  const W = 1200, H = 820;
  const [scale, setScale] = React.useState(1);

  React.useLayoutEffect(() => {
    const compute = () => {
      const pad = 40;
      const s = Math.min(1, (window.innerWidth - pad) / W, (window.innerHeight - pad) / H);
      setScale(Math.max(0.3, s));
    };
    compute();
    window.addEventListener('resize', compute);
    return () => window.removeEventListener('resize', compute);
  }, []);

  return (
    <div style={{ position:'relative', width:Math.round(W*scale), height:Math.round(H*scale), flexShrink:0 }}>
      <div style={{
        position:'absolute', top:0, left:0, width:W, height:H,
        transformOrigin:'top left',
        transform: scale < 1 ? `scale(${scale})` : undefined,
      }}>
        <ResearcherInbox />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
