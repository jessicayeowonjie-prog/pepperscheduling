<script type="text/babel">

// ── Date helpers ─────────────────────────────────────────────────────────────
const KO_DAYS   = ['일','월','화','수','목','금','토'];
const KO_MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const startOfMonth = (d) => new Date(d.getFullYear(), d.getMonth(), 1);
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
const sameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const ymd = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtKoDate = (d) => `${d.getMonth()+1}월 ${d.getDate()}일 (${KO_DAYS[d.getDay()]})`;
const fmtTime   = (h, m) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

// Scheduling window: July 12–25, 2026
const TODAY      = new Date(2026, 6, 12);
const WINDOW_END = addDays(TODAY, 14);

const DAY_HOURS = {
  '2026-07-12': [13, 21],
  '2026-07-13': [ 9, 21],
  '2026-07-14': [ 9, 21],
  '2026-07-15': [ 9, 21],
  '2026-07-16': [ 9, 21],
  '2026-07-17': [ 9, 21],
  '2026-07-18': [ 9, 21],
  '2026-07-19': [13, 21],
  '2026-07-20': [ 9, 21],
  '2026-07-21': [ 9, 21],
  '2026-07-22': [ 9, 21],
  '2026-07-23': [ 9, 21],
  '2026-07-24': [ 9, 21],
  '2026-07-25': [ 9, 21],
};

function buildAvailability(extraTaken = new Set(), openedSlots = new Set(), customSlots = []) {
  const taken = new Set([
    '2026-07-13_10:00','2026-07-13_14:50',
    '2026-07-14_11:50','2026-07-14_16:50',
    '2026-07-15_09:55','2026-07-15_15:55',
    '2026-07-16_13:05','2026-07-17_10:50','2026-07-17_19:30',
    '2026-07-20_09:00','2026-07-20_14:00',
    '2026-07-21_11:50','2026-07-22_15:55',
    '2026-07-23_10:00','2026-07-23_18:25',
    '2026-07-24_13:05',
  ]);
  extraTaken.forEach((t) => taken.add(t));
  openedSlots.forEach((k) => taken.delete(k));
  const days = [];
  for (let i = 0; i < 14; i++) {
    const d    = addDays(TODAY, i);
    const key  = ymd(d);
    const hrs  = DAY_HOURS[key];
    const slots = [];
    if (hrs) {
      const [startHour, endHour] = hrs;
      let h = startHour, m = 0;
      while (h * 60 + m + 40 <= endHour * 60) {
        const t = fmtTime(h, m);
        slots.push({ time: t, taken: taken.has(`${key}_${t}`) });
        m += 55;
        while (m >= 60) { m -= 60; h++; }
      }
    }
    // Inject researcher-added custom slots
    (customSlots || []).filter((s) => s.key === key).forEach((s) => {
      if (!slots.find((sl) => sl.time === s.time))
        slots.push({ time: s.time, taken: taken.has(`${key}_${s.time}`) });
    });
    slots.sort((a, b) => a.time.localeCompare(b.time));
    days.push({ date: d, key, slots });
  }
  return days;
}

// ── Sheets API ────────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXdMr1XaCuQx-1__vtkTg3cExBkBApYNCXkFP_mExkqOeE-TCS-odbqrTuWB_-vaea/exec';

function addMin(t, n) {
  const [h, m] = t.split(':').map(Number);
  const total = h * 60 + m + n;
  return fmtTime(Math.floor(total / 60), total % 60);
}

// ── Study info (연구참여설명서) ───────────────────────────────────────────────
function StudyInfo({ C, readInfo, setReadInfo, onBack, onNext }) {
  const scrollRef  = React.useRef(null);
  const [atBottom, setAtBottom]     = React.useState(false);
  const [hasOverflow, setHasOverflow] = React.useState(false);

  const onScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    const bottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 24;
    setAtBottom(bottom);
    if (bottom) setReadInfo(true);
  };

  React.useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    setHasOverflow(el.scrollHeight > el.clientHeight + 4);
  }, []);

  const scrollToBottom = () => {
    const el = scrollRef.current;
    if (!el) return;
    el.scrollTo({ top: el.scrollHeight, behavior:'smooth' });
    setReadInfo(true);
  };

  return (
    <div style={{ maxWidth:820, margin:'0 auto' }}>
      <div style={{ fontSize:12, letterSpacing:1.2, color:C.muted, textTransform:'uppercase', marginBottom:10 }}>
        Step 2 · 사전 안내

      <div style={{ position:'relative' }}>
        <div ref={scrollRef} onScroll={onScroll} style={{
          background:C.surface, border:`1px solid ${C.line}`, borderRadius:12,
          padding:'28px 36px', maxHeight:380, overflowY:'auto',
          fontSize:15, lineHeight:1.8, color:C.ink,
        }}>
          <p style={{ margin:'0 0 14px' }}>
            본 연구의 목적은 사람들이 소셜 로봇 페퍼(Pepper)와 반복적으로 대화할 때 자신의 소통 방식을 로봇에 맞게
            조율하는 행동을 보이는지, 그리고 로봇의 설계가 그러한 조율 행동 및 관계적 결과에 어떠한 영향을 미치는지
            이해하는 것입니다. 이를 통해 사람들이 기계와의 소통에서도 대인 상호작용과 유사한 행동을 보이는지 파악하고,
            향후 소셜 로봇 설계 및 인간–기계 상호작용 연구에 필요한 경험적 근거를 마련하고자 합니다.
          </p>

          <InfoH C={C}>1) 연구참여대상 및 연구대상자 수</InfoH>
          <p style={{ margin:'0 0 16px' }}>
            본 연구는 만 18세 이상 남녀로서 3번의 세션에 걸쳐 소셜 로봇과 약 10분 정도 대화하는 것이 가능한 사람들이
            참여할 수 있습니다. 모집되신 연구대상자들을 다시 제외할 기준은 없습니다. 연구 참여는 자발적이며,
            대략 <strong style={{ fontWeight:500 }}>55명</strong>의 실험 참여자를 모집할 계획입니다.
          </p>

          <InfoH C={C}>2) 연구참여기간</InfoH>

            이 연구는 <strong style={{ fontWeight:500 }}>2026년 6월 초부터 12월 초순까지</strong> 진행될 예정입니다.
            단 한 번의 실험에 참여하는 시간은 약 <strong style={{ fontWeight:500 }}>30분에서 50분 정도</strong>
            (실험 안내 + 사전 설문 + 대화 세션 + 사후 설문 + 디브리핑)일 것으로 예상됩니다.
          </p>

            이 실험은 <strong style={{ fontWeight:500 }}>1~2주에 걸쳐 총 세 차례의 세션</strong>으로 구성되어 있으며,

          <ul style={{ margin:'0 0 18px', paddingLeft:20, listStyle:'disc' }}>
            <li style={{ margin:'0 0 10px' }}>

              궁금한 점에 대해 보조 연구원이 답변해 드립니다. 내용을 충분히 확인하신 후 참여 동의서에 서명하시게 됩니다.

            </li>
          </ul>

          <InfoH C={C}>4) 개인정보 및 자료 처리</InfoH>

// ── Sessions ──────────────────────────────────────────────────────────────────
function Sessions({ C, selected, setSelected, onBack, onNext }) {
  const [avail, setAvail] = React.useState(() => buildAvailability(new Set(), new Set(), []));
  const lookupDay = dayByKey;

  React.useEffect(() => {
    const refresh = async () => {
      const data = await apiGet();
      if (!data) return;
      const taken = new Set();
      (data.submissions || []).filter(s => !s.deleted).forEach(sub =>
        (sub.sessions || []).forEach(s => taken.add(`${s.key}_${s.time}`))
      );
      const cfg = data.config || {};
      (cfg.closedSlots || []).forEach(k => taken.add(k));
      const built = buildAvailability(taken, new Set(cfg.openedSlots || []), cfg.customSlots || []);
      setAvail(built);
      setSelected(prev => prev.filter(s => {
        const day  = built.find(d => d.key === s.key);
        const slot = day && day.slots.find(sl => sl.time === s.time);
        return !slot || !slot.taken;
      }));
    };
    refresh();
    const id = setInterval(refresh, 10000);
    return () => clearInterval(id);
  }, []);

  const toggle = (key, time) => {
    const day  = avail.find((d) => d.key === key);
    const slot = day && day.slots.find((s) => s.time === time);
    if (slot && slot.taken) return;
    const exists = selected.find((s) => s.key === key && s.time === time);
    if (exists) {
      setSelected(selected.filter((s) => !(s.key === key && s.time === time)));
      return;
    }
    if (selected.length >= 3) return;
    const d = lookupDay(key).date;
    const tooClose = selected.some((s) => {
      const sd = lookupDay(s.key).date;
      return Math.abs((d - sd) / 86400000) < 1;
    });
    if (tooClose) return;
    setSelected([...selected, { key, time }].sort((a, b) => (a.key+a.time).localeCompare(b.key+b.time)));
  };

  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:24 }}>
        <div>
          <h2 style={{ fontSize:24, fontWeight:500, margin:'0 0 6px', letterSpacing:-0.2 }}>세션 3회를 선택해 주세요</h2>
          <p style={{ fontSize:13, color:C.muted, margin:0 }}>
            7월 12일 – 7월 25일 · 09:00 – 21:00 (일부 날짜는 13:00 시작) · 각 세션은 최소 1일 이상 간격을 두어야 합니다.
          </p>
        </div>
        <SelectionPills C={C} selected={selected} onRemove={(s) => toggle(s.key, s.time)} />
      </div>

      <MonthDrawer C={C} availability={avail} dayByKey={lookupDay} selected={selected} toggle={toggle} />

      <div style={{
        position:'sticky', bottom:-36, marginTop:24,
        padding:'20px 0 4px',
        background:`linear-gradient(to bottom, transparent, ${C.bg} 28%)`,
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <button onClick={onBack} style={{
          background:'transparent', border:'none', color:C.muted,
          fontFamily:'inherit', fontSize:13, cursor:'pointer', padding:'8px 0',
        }}>← 이전</button>

        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          {selected.length < 3 ? (
            <span style={{ fontSize:12, color:C.muted }}>{3-selected.length}개의 세션을 더 선택해 주세요</span>
          ) : (
            <>
              <span style={{ fontSize:12, color:C.muted }}>세션 3회가 모두 선택되었습니다</span>
              <button onClick={onNext} style={primaryBtn(C)}>참여자 정보 입력 →</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function SelectionPills({ C, selected, onRemove }) {

// ── Month + slot drawer ───────────────────────────────────────────────────────
function MonthDrawer({ C, selected, toggle, availability, dayByKey: lookupDay }) {
  const [focus, setFocus] = React.useState((availability || BASE_DAYS)[0].key);
  const day = (availability || BASE_DAYS).find(d => d.key === focus) || lookupDay(focus);
  const monthStart = startOfMonth(TODAY);
  const firstDow   = monthStart.getDay();
  const daysInMonth = new Date(monthStart.getFullYear(), monthStart.getMonth()+1, 0).getDate();

  return (
    <div style={{
      display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:24,
      background:C.surface, border:`1px solid ${C.line}`, borderRadius:12,
      overflow:'hidden', minHeight:420,
    }}>
      {/* Month grid */}
      <div style={{ padding:'24px 24px 24px 28px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <div style={{ fontSize:15, fontWeight:500 }}>{TODAY.getFullYear()}년 {TODAY.getMonth()+1}월</div>
          <div style={{ display:'flex', gap:6 }}>
            <NavBtn C={C}>‹</NavBtn>
            <NavBtn C={C}>›</NavBtn>
          </div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, fontSize:11, color:C.muted, marginBottom:6 }}>
          {KO_DAYS.map((d) => <div key={d} style={{ textAlign:'center', padding:'4px 0' }}>{d}</div>)}
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4 }}>
          {Array.from({ length: firstDow }).map((_,i) => <div key={'pad'+i} />)}
          {Array.from({ length: daysInMonth }).map((_,i) => {
            const date = new Date(monthStart.getFullYear(), monthStart.getMonth(), i+1);
            const key  = ymd(date);
            const av   = (availability || BASE_DAYS).find(d => d.key === key);
            const free = av && av.slots.some((s) => !s.taken);
            const isFocus = key === focus;
            const selCount = selected.filter((s) => s.key === key).length;
            const isPast = date < TODAY;
            return (
              <button key={key} onClick={() => av && free && setFocus(key)} disabled={!av || !free}
                style={{
                  aspectRatio:'1/1', borderRadius:8,
                  border: isFocus ? `1px solid ${C.ink}` : '1px solid transparent',
                  background: isFocus ? C.ink : selCount ? C.a : 'transparent',
                  color: isFocus ? C.surface : (!av || !free) ? C.muted : C.ink,
                  fontFamily:'inherit', fontSize:13, cursor: av && free ? 'pointer' : 'default',
                  position:'relative', padding:6, textAlign:'left',
                  opacity: isPast ? 0.35 : !av ? 0.45 : !free ? 0.55 : 1,
                  fontVariantNumeric:'tabular-nums',
                }}>
                <div style={{ fontWeight: isFocus ? 500 : 400 }}>{i+1}</div>
                {av && free && (
                  <div style={{ position:'absolute', bottom:6, left:6, right:6, display:'flex', gap:2 }}>
                    {selCount > 0
                      ? <span style={{ width:6, height:6, borderRadius:3, background: isFocus ? C.surface : C.ink }} />
                      : <span style={{ fontSize:10, color: isFocus ? C.surface : C.muted, opacity:0.8 }}>
                          {av.slots.filter((s) => !s.taken).length}
                        </span>
                    }
                  </div>
                )}
              </button>
            );
          })}
        </div>
        <div style={{ display:'flex', gap:16, marginTop:18, fontSize:11, color:C.muted }}>
          <Legend swatch={C.a} label="선택됨" />
          <Legend swatch={C.line} label="가능" />
          <Legend swatch={C.muted} label="마감" outline />
        </div>
      </div>

      {/* Slot drawer */}
      <div style={{ padding:'24px 28px 24px 24px', borderLeft:`1px solid ${C.line}` }}>
        <div style={{ fontSize:13, color:C.muted, marginBottom:4 }}>{KO_DAYS[day.date.getDay()]}요일</div>
        <div style={{ fontSize:18, fontWeight:500, marginBottom:18, letterSpacing:-0.2 }}>
          {day.date.getMonth()+1}월 {day.date.getDate()}일
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8, maxHeight:320, overflowY:'auto', paddingRight:4 }}>
          {day.slots.map((s) => {
            const isSel = !!selected.find((x) => x.key === day.key && x.time === s.time);
            return (
              <SlotBtn key={s.time} C={C} time={s.time} taken={s.taken} selected={isSel}
                       onClick={() => !s.taken && toggle(day.key, s.time)} />
            );
          })}
          {day.slots.length === 0 && <div style={{ color:C.muted, fontSize:13 }}>이 날에는 가능한 시간대가 없습니다.</div>}
        </div>
      </div>
    </div>
  );
}

      <div style={{ background:C.surface, border:`1px solid ${C.line}`, borderRadius:12, padding:'20px 24px', textAlign:'left' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:14 }}>
          <div style={{ fontSize:11, color:C.muted, letterSpacing:1.2, textTransform:'uppercase' }}>임시 예약</div>
          <div style={{ fontSize:11, color:C.muted, fontVariantNumeric:'tabular-nums' }}>{form.name || '—'}</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {selected.map((s, i) => {
            const d = dayByKey(s.key).date;
            return (
              <div key={i} style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'10px 0', borderTop: i>0 ? `1px solid ${C.line}` : 'none',
              }}>
                <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <span style={{
                    width:22, height:22, borderRadius:11,
                    background: i===0 ? C.a : i===1 ? C.b : C.c,
                    display:'inline-flex', alignItems:'center', justifyContent:'center',
                    fontSize:11, fontWeight:500,
                  }}>{i+1}</span>
                  <span style={{ fontSize:14, fontVariantNumeric:'tabular-nums' }}>{fmtKoDate(d)}</span>
                </div>
                <div style={{ fontSize:13, color:C.muted, fontVariantNumeric:'tabular-nums' }}>{s.time} – {addMin(s.time,40)}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ marginTop:26, fontSize:12, color:C.muted }}>
        24시간 이내에 확정 문자를 보내드립니다 · 문의: jessi2001@korea.ac.kr
      </div>
      <button onClick={onReset} style={{
        marginTop:28, padding:'8px 16px', background:'transparent',
        border:`1px solid ${C.line}`, color:C.ink, borderRadius:999,
        fontFamily:'inherit', fontSize:13, cursor:'pointer',
      }}>처음으로 돌아가기</button>
    </div>
  );
}

function saveSubmission(submission) {
  apiPost({ action: 'submit', submission });
}

// ── Withdrawn ─────────────────────────────────────────────────────────────────
function Withdrawn({ C, onReset }) {
  return (
    <div style={{ maxWidth:540, margin:'0 auto', textAlign:'center', paddingTop:32 }}>
      <div style={{
        width:56, height:56, borderRadius:28,
        background:C.surface, border:`1px solid ${C.line}`,
        margin:'0 auto 22px', display:'inline-flex', alignItems:'center', justifyContent:'center',
      }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </div>
      <h2 style={{ fontSize:22, fontWeight:500, margin:'0 0 14px', letterSpacing:-0.2 }}>신청이 철회되었습니다</h2>
      <p style={{ fontSize:14, color:C.muted, lineHeight:1.75, margin:'0 0 32px' }}>
        연구 참여에 동의하시지 않음으로 연구 참여 신청은 철회 되었습니다.<br />
        실수로 누르셨을 경우, 다시 처음부터 시작해주시면 감사하겠습니다.
      </p>
      <button onClick={onReset} style={{
        padding:'10px 24px', background:'transparent',
        border:`1px solid ${C.line}`, color:C.ink, borderRadius:999,
        fontFamily:'inherit', fontSize:13, cursor:'pointer',
      }}>처음으로 돌아가기</button>
    </div>
  );
}

// ── BookingApp ────────────────────────────────────────────────────────────────
function BookingApp() {
  const C = PALETTES.blush;
  const [step, setStep]         = React.useState('intro');
  const [selected, setSelected] = React.useState([]);
  const [form, setForm]         = React.useState({ name:'', dob:'', phone:'', account:'', smsConsent:null, consent:null });
  const [readInfo, setReadInfo] = React.useState(false);

  const reset = () => {
    setStep('intro'); setSelected([]);
    setForm({ name:'', dob:'', phone:'', account:'', smsConsent:null, consent:null });
    setReadInfo(false);
  };

  const submit = () => {
    const now = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    saveSubmission({
      id: `req-${now.getTime()}`,
      name: form.name.trim(),
      dob:  form.dob,
      phone: form.phone.trim(),
      account: form.account.trim(),
      pid: '',
      submittedAt: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`,
      status: 'pending',
      sessions: selected.map((s) => ({ key: s.key, time: s.time })),
    });
    setStep('confirm');
  };

  const stepIdx = { intro:0, info:1, sessions:2, details:3, confirm:4 }[step];

  return (
    <div style={frameStyle(C)}>
      <Header C={C} stepIdx={stepIdx} />
      <div style={{ flex:1, overflow:'auto', padding:'36px 56px 56px' }}>
        {step==='intro'    && <Intro C={C} onNext={() => setStep('info')} />}
        {step==='info'     && <StudyInfo C={C} readInfo={readInfo} setReadInfo={setReadInfo}
                                onBack={() => setStep('intro')} onNext={() => setStep('sessions')} />}
        {step==='sessions' && <Sessions C={C} selected={selected} setSelected={setSelected}
                                onBack={() => setStep('info')} onNext={() => setStep('details')} />}
        {step==='details'  && <Details C={C} form={form} setForm={setForm} selected={selected}
                                onBack={() => setStep('sessions')} onNext={submit} onWithdraw={() => setStep('withdrawn')} />}
        {step==='confirm'   && <Confirm C={C} form={form} selected={selected} onReset={reset} />}
        {step==='withdrawn' && <Withdrawn C={C} onReset={reset} />}
      </div>
    </div>
  );
}

// ── Scaled viewport wrapper ───────────────────────────────────────────────────
function App() {
  const W = 1200, H = 820;
  const [scale, setScale] = React.useState(1);

  React.useLayoutEffect(() => {
    const compute = () => {
      const pad = 40;
      const s = Math.min(1, (window.innerWidth - pad) / W, (window.innerHeight - pad) / H);
      setScale(Math.max(0.3, s));
    };
    compute();
    window.addEventListener('resize', compute);
    return () => window.removeEventListener('resize', compute);
  }, []);

  return (
    <div style={{ position:'relative', width: Math.round(W * scale), height: Math.round(H * scale), flexShrink:0 }}>
      <div style={{
        position:'absolute', top:0, left:0, width:W, height:H,
        transformOrigin:'top left',
        transform: scale < 1 ? `scale(${scale})` : undefined,
      }}>
        <BookingApp />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
