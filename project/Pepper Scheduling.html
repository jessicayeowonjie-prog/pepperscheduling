<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Pepper Study · 일정 예약</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #efece6; }
  body {
    font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
    color: #2a2722;
  }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 5px; }
  *::-webkit-scrollbar-track { background: transparent; }
  input[type="date"] { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="booking.jsx"></script>
<script type="text/babel" src="researcher.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "blush",
  "calendarStyle": "month-drawer",
  "showConsent": true
}/*EDITMODE-END*/;

const PALETTE_OPTIONS = [
  ['#f6f2ec','#e8d5c4','#c9d6c4','#d6c9d9'],   // warm
  ['#f4f5f0','#cdd9c8','#c5d0db','#e3dcc6'],   // sage
  ['#fbf7f4','#f2d4cf','#cdd6e8','#e9dccb'],   // blush
  ['#f3f1ee','#d4d4d4','#bfc8c2','#c2bdb4'],   // stone
  ['#f7f4ef','#d8c8e0','#cce0d6','#f0d6c8'],   // iris
];
const PALETTE_KEYS = ['warm','sage','blush','stone','iris'];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Map palette swatch array back to palette key.
  const palToKey = (val) => {
    if (typeof val === 'string') return val;
    const idx = PALETTE_OPTIONS.findIndex((p) => p[0] === val[0]);
    return idx >= 0 ? PALETTE_KEYS[idx] : 'warm';
  };
  const paletteKey = palToKey(t.palette);
  const paletteValue = PALETTE_OPTIONS[PALETTE_KEYS.indexOf(paletteKey)] || PALETTE_OPTIONS[0];

  // Single participant flow — calendar style A (month + slot drawer).
  const calendarStyle = (t.calendarStyle && t.calendarStyle !== 'auto') ? t.calendarStyle : 'month-drawer';

  return (
    <>
      <DesignCanvas initialZoom={0.6} initialCx={600} initialCy={420}>
        <DCSection id="participant" title="참여자 화면" subtitle="월간 캘린더 + 시간 패널 · 5단계 플로우">
          <DCArtboard id="p-month-drawer" label="A · 월간 + 시간 패널" width={1200} height={820}>
            <BookingApp
              palette={paletteKey}
              calendarStyle={calendarStyle}
              showConsent={t.showConsent}
            />
          </DCArtboard>
        </DCSection>

        <DCSection id="researcher" title="연구자 화면" subtitle="신청이 들어오면 받게 되는 이메일 / 받은편지함 미리보기">
          <DCArtboard id="r-inbox" label="받은편지함 · 신청 검토" width={1200} height={820}>
            <ResearcherInbox palette={paletteKey} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Visual" />
        <TweakColor label="Palette" value={paletteValue} options={PALETTE_OPTIONS}
                    onChange={(v) => setTweak('palette', palToKey(v))} />
        <TweakSection label="Booking" />
        <TweakRadio label="Calendar style" value={t.calendarStyle}
                    options={[
                      { value: 'auto', label: 'All 3' },
                      { value: 'month-drawer', label: 'Month' },
                      { value: 'two-week-grid', label: '2-week' },
                      { value: 'agenda', label: 'List' },
                    ]}
                    onChange={(v) => setTweak('calendarStyle', v)} />
        <TweakToggle label="Show consent block" value={t.showConsent}
                     onChange={(v) => setTweak('showConsent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
