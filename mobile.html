<script type="text/babel">
// ── Palette ───────────────────────────────────────────────────────────────────
const C = {
  bg:'#fbf7f4', surface:'#fffdfb', ink:'#2b2422', muted:'#7e7068',
  line:'#ede2db', a:'#f2d4cf', b:'#cdd6e8', c:'#e9dccb', accent:'#a4625a',
};

// ── Date helpers ──────────────────────────────────────────────────────────────
const KO_DAYS = ['일','월','화','수','목','금','토'];
const addDays  = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const ymd      = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtTime  = (h, m) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
const fmtKoDate = (d) => `${d.getMonth()+1}월 ${d.getDate()}일 (${KO_DAYS[d.getDay()]})`;
function addMin(t, n) {
  const [h, m] = t.split(':').map(Number);
  const tot = h*60 + m + n;
  return fmtTime(Math.floor(tot/60), tot%60);
}

const TODAY = new Date(2026, 6, 12);
const DAY_HOURS = {
  '2026-07-12':[13,21],'2026-07-13':[9,21],'2026-07-14':[9,21],
  '2026-07-15':[9,21],'2026-07-16':[9,21],'2026-07-17':[9,21],
  '2026-07-18':[9,21],'2026-07-19':[13,21],'2026-07-20':[9,21],
  '2026-07-21':[9,21],'2026-07-22':[9,21],'2026-07-23':[9,21],
  '2026-07-24':[9,21],'2026-07-25':[9,21],
};

function buildAvailability(extraTaken = new Set(), openedSlots = new Set(), customSlots = []) {
  const taken = new Set([
    '2026-07-13_10:00','2026-07-13_14:50',
    '2026-07-14_11:50','2026-07-14_16:50',
    '2026-07-15_09:55','2026-07-15_15:55',
    '2026-07-16_13:05','2026-07-17_10:50','2026-07-17_19:30',
    '2026-07-20_09:00','2026-07-20_14:00',
    '2026-07-21_11:50','2026-07-22_15:55',
    '2026-07-23_10:00','2026-07-23_18:25',
    '2026-07-24_13:05',
  ]);
  extraTaken.forEach(t => taken.add(t));
  openedSlots.forEach(k => taken.delete(k));
  const days = [];
  for (let i = 0; i < 14; i++) {
    const d   = addDays(TODAY, i);
    const key = ymd(d);
    const hrs = DAY_HOURS[key];
    const slots = [];
    if (hrs) {
      const [startHour, endHour] = hrs;
      let h = startHour, m = 0;
      while (h * 60 + m + 40 <= endHour * 60) {
        const t = fmtTime(h, m);
        slots.push({ time: t, taken: taken.has(`${key}_${t}`) });
        m += 55;
        while (m >= 60) { m -= 60; h++; }
      }
    }
    (customSlots || []).filter(s => s.key === key).forEach(s => {
      if (!slots.find(sl => sl.time === s.time))
        slots.push({ time: s.time, taken: taken.has(`${key}_${s.time}`) });
    });
    slots.sort((a, b) => a.time.localeCompare(b.time));
    days.push({ date: d, key, slots });
  }
  return days;
}

// ── Sheets API ────────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXdMr1XaCuQx-1__vtkTg3cExBkBApYNCXkFP_mExkqOeE-TCS-odbqrTuWB_-vaea/exec';

async function apiGet() {
  try {
    const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
    return await res.json();
  } catch(e) { return null; }
}

async function apiPost(data) {
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data),
    });
  } catch(e) {}
}

// ── Shared style helpers ───────────────────────────────────────────────────────

// ── ProgressBar ───────────────────────────────────────────────────────────────
function ProgressBar({ step }) {
  const steps = ['intro','info','sessions','details','confirm'];
  const idx = steps.indexOf(step);
  const pct = idx / (steps.length - 1) * 100;
  return (
    <div style={{ height: 3, background: C.line, borderRadius: 2, margin: '0 20px' }}>
      <div style={{
        height: 3, borderRadius: 2, background: C.ink,
        width: `${pct}%`, transition: 'width 300ms ease',
      }} />
    </div>
  );
}

// ── TopBar ────────────────────────────────────────────────────────────────────

}

// ── Sessions ──────────────────────────────────────────────────────────────────
function Sessions({ selected, setSelected, onNext }) {
  const [avail, setAvail] = React.useState(() => buildAvailability(new Set(), new Set(), []));
  const [focus, setFocus] = React.useState(null);
  const stripRef = React.useRef(null);

  React.useEffect(() => {
    const refresh = async () => {
      const data = await apiGet();
      if (!data) return;
      const taken = new Set();
      (data.submissions || []).filter(s => !s.deleted).forEach(sub =>
        (sub.sessions || []).forEach(s => taken.add(`${s.key}_${s.time}`))
      );
      const cfg = data.config || {};
      (cfg.closedSlots || []).forEach(k => taken.add(k));
      const built = buildAvailability(taken, new Set(cfg.openedSlots || []), cfg.customSlots || []);
      setAvail(built);
      setSelected(prev => prev.filter(s => {
        const day = built.find(d => d.key === s.key);
        const slot = day && day.slots.find(sl => sl.time === s.time);
        return !slot || !slot.taken;
      }));
    };
    refresh();
    const id = setInterval(refresh, 10000);
    return () => clearInterval(id);
  }, []);

  const availDays = avail.filter(d => d.slots.some(s => !s.taken));

  React.useEffect(() => {
    if (!focus && availDays.length) setFocus(availDays[0].key);
  }, [avail]);

  const focusDay = avail.find(d => d.key === focus);

  const toggle = (key, time) => {
    const day  = avail.find(d => d.key === key);
    const slot = day && day.slots.find(s => s.time === time);
    if (slot && slot.taken) return;
    const exists = selected.find(s => s.key === key && s.time === time);
    if (exists) { setSelected(selected.filter(s => !(s.key === key && s.time === time))); return; }
    if (selected.length >= 3) return;
    const d  = new Date(key);
    const tooClose = selected.some(s => Math.abs((d - new Date(s.key)) / 86400000) < 1);
    if (tooClose) return;
    setSelected([...selected, { key, time }].sort((a, b) => (a.key+a.time).localeCompare(b.key+b.time)));
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'calc(100svh - 65px)' }}>
      {/* Selected sessions summary */}
      <div style={{ padding:'14px 20px 10px', flexShrink:0 }}>
        <div style={{ fontSize:13, fontWeight:500, marginBottom:4 }}>세션 3회를 선택해 주세요</div>
        <div style={{ fontSize:11, color:C.muted, marginBottom:12 }}>
          7월 12일 – 25일 · 각 세션은 최소 1일 간격
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {[0,1,2].map(i => {
            const s = selected[i];
            if (!s) return (
              <div key={i} style={{
                flex:1, padding:'8px 0', borderRadius:8, textAlign:'center',
                border:`1px dashed ${C.line}`, color:C.muted, fontSize:11,
              }}>세션 {i+1}</div>
            );
            const d = avail.find(day => day.key === s.key)?.date;
            return (
              <button key={i} onClick={() => toggle(s.key, s.time)} style={{
                flex:1, padding:'7px 6px', borderRadius:8, textAlign:'center',
                background: i===0 ? C.a : i===1 ? C.b : C.c,
                border:'none', cursor:'pointer', fontFamily:'inherit',
              }}>
                <div style={{ fontSize:10, color:C.ink, fontWeight:500 }}>
                  {d ? `${d.getMonth()+1}/${d.getDate()}` : s.key}
                </div>
                <div style={{ fontSize:10, color:C.ink, fontVariantNumeric:'tabular-nums' }}>{s.time}</div>
                <div style={{ fontSize:9, color:C.muted, marginTop:1 }}>탭하여 취소</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Day strip */}
      <div ref={stripRef} style={{
        display:'flex', gap:6, overflowX:'auto', padding:'6px 20px 10px',
        flexShrink:0, borderBottom:`1px solid ${C.line}`,
      }}>
        {avail.map(day => {
          const freeCount = day.slots.filter(s => !s.taken).length;
          const isFocus   = day.key === focus;
          const selCount  = selected.filter(s => s.key === day.key).length;
          return (
            <button key={day.key} onClick={() => setFocus(day.key)} disabled={freeCount === 0} style={{
              flexShrink:0, width:54, padding:'8px 4px', borderRadius:10, textAlign:'center',
              border:`1px solid ${isFocus ? C.ink : C.line}`,
              background: isFocus ? C.ink : selCount ? C.a : C.surface,
              color: isFocus ? C.surface : freeCount === 0 ? C.muted : C.ink,
              cursor: freeCount === 0 ? 'not-allowed' : 'pointer',
              fontFamily:'inherit', opacity: freeCount === 0 ? 0.4 : 1,
            }}>
              <div style={{ fontSize:10, marginBottom:2 }}>{KO_DAYS[day.date.getDay()]}</div>
              <div style={{ fontSize:16, fontWeight:500, lineHeight:1 }}>{day.date.getDate()}</div>
              <div style={{ fontSize:9, marginTop:4, color: isFocus ? 'rgba(255,255,255,0.7)' : C.muted }}>
                {freeCount > 0 ? `${freeCount}개` : '마감'}
              </div>
            </button>
          );
        })}
      </div>

      {/* Time slots */}
      <div style={{ flex:1, overflowY:'auto', padding:'14px 20px 100px' }}>
        {focusDay ? (
          <>
            <div style={{ fontSize:13, fontWeight:500, marginBottom:12, color:C.muted }}>
              {focusDay.date.getMonth()+1}월 {focusDay.date.getDate()}일 ({KO_DAYS[focusDay.date.getDay()]}) · 가능한 시간
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
              {focusDay.slots.map(s => {
                const isSel   = !!selected.find(x => x.key === focusDay.key && x.time === s.time);
                const canAdd  = !s.taken && !isSel && selected.length < 3;
                const tooClose = !s.taken && !isSel && selected.some(x => Math.abs((new Date(focusDay.key) - new Date(x.key)) / 86400000) < 1);
                return (
                  <button key={s.time} onClick={() => !s.taken && toggle(focusDay.key, s.time)}
                    disabled={s.taken || tooClose} style={{
                      padding:'12px 6px', borderRadius:10, fontFamily:'inherit', fontSize:13,
                      fontVariantNumeric:'tabular-nums', textAlign:'center',
                      border:`1px solid ${isSel ? 'transparent' : s.taken ? C.line : tooClose ? C.line : C.line}`,
                      background: isSel ? C.ink : s.taken ? C.bg : tooClose ? C.bg : C.surface,
                      color: isSel ? C.surface : s.taken ? C.muted : tooClose ? C.muted : C.ink,
                      cursor: s.taken || tooClose ? 'not-allowed' : 'pointer',
                      opacity: s.taken ? 0.4 : tooClose ? 0.35 : 1,
                    }}>
                    <div style={{ fontWeight: isSel ? 500 : 400 }}>{s.time}</div>
                    {isSel && <div style={{ fontSize:9, marginTop:3, opacity:0.7 }}>선택됨</div>}
                    {s.taken && <div style={{ fontSize:9, marginTop:3 }}>마감</div>}
                  </button>
                );
              })}
              {focusDay.slots.length === 0 && (
                <div style={{ gridColumn:'1/-1', color:C.muted, fontSize:13, padding:'20px 0', textAlign:'center' }}>
                  이 날에는 가능한 시간대가 없습니다.
                </div>
              )}
            </div>
          </>
        ) : (
          <div style={{ color:C.muted, fontSize:13, textAlign:'center', paddingTop:32 }}>
            날짜를 선택해 주세요.
          </div>
        )}
      </div>

      {/* Bottom nav */}
      <div style={{ position:'sticky', bottom:0, padding:'12px 20px', background:C.bg,
        borderTop:`1px solid ${C.line}`, paddingBottom:`calc(12px + env(safe-area-inset-bottom))` }}>
        {selected.length < 3 ? (
          <div style={{ textAlign:'center', fontSize:13, color:C.muted, padding:'10px 0' }}>
            {3 - selected.length}개의 세션을 더 선택해 주세요
          </div>
        ) : (
          <button onClick={onNext} style={primaryBtn}>참여자 정보 입력 →</button>
        )}
      </div>
    </div>
  );
}

// ── Details ───────────────────────────────────────────────────────────────────
function Details({ form, setForm, selected, avail, onNext, onWithdraw }) {

  const inputStyle = {
    width:'100%', background:C.surface, border:`1px solid ${C.line}`,
    borderRadius:10, padding:'13px 14px', fontSize:16, color:C.ink,
    fontFamily:'inherit', outline:'none',
  };

  const choiceBtn = (active, onClick, label) => (
    <button onClick={onClick} style={{
      width:'100%', padding:'12px 14px', borderRadius:10, fontFamily:'inherit', fontSize:14,
      cursor:'pointer', textAlign:'left', transition:'all 160ms',
      border:`1px solid ${active ? C.ink : C.line}`,

      color: active ? C.bg : C.ink,
      fontWeight: active ? 500 : 400,

        <h2 style={{ fontSize:22, fontWeight:500, marginBottom:6, letterSpacing:-0.2 }}>참여자 정보</h2>
        <p style={{ fontSize:13, color:C.muted, marginBottom:24, lineHeight:1.5 }}>

        {/* Session summary */}
        <div style={{ background:C.surface, border:`1px solid ${C.line}`, borderRadius:12, padding:'14px 16px', marginBottom:20 }}>
          <div style={{ fontSize:11, color:C.muted, letterSpacing:1.2, textTransform:'uppercase', marginBottom:10 }}>선택한 세션</div>
          {selected.map((s, i) => {
            const d = avail.find(day => day.key === s.key)?.date;
            return (
              <div key={i} style={{
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'8px 0', borderTop: i > 0 ? `1px solid ${C.line}` : 'none',

                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <span style={{
                    width:20, height:20, borderRadius:10,
                    background: i===0 ? C.a : i===1 ? C.b : C.c,

                    fontSize:10, fontWeight:500, flexShrink:0,
                  }}>{i+1}</span>
                  <span style={{ fontSize:13, fontVariantNumeric:'tabular-nums' }}>
                    {d ? fmtKoDate(d) : s.key}
                  </span>
                </div>
                <span style={{ fontSize:12, color:C.muted, fontVariantNumeric:'tabular-nums' }}>
                  {s.time} – {addMin(s.time,40)}
                </span>
              </div>
            );
          })}
        </div>

        {/* Form fields */}
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <label style={{ display:'flex', flexDirection:'column', gap:6 }}>
            <span style={{ fontSize:12, color:C.muted }}>이름</span>
            <input value={form.name} onChange={upd('name')} placeholder="홍길동" style={inputStyle}
              onFocus={e => e.target.style.borderColor = C.ink}

          </label>
          <label style={{ display:'flex', flexDirection:'column', gap:6 }}>
            <span style={{ fontSize:12, color:C.muted }}>생년월일</span>
            <input type="date" value={form.dob} onChange={upd('dob')} style={inputStyle}
              onFocus={e => e.target.style.borderColor = C.ink}
              onBlur={e => e.target.style.borderColor = C.line} />
          </label>
          <label style={{ display:'flex', flexDirection:'column', gap:6 }}>
            <span style={{ fontSize:12, color:C.muted }}>휴대전화</span>
            <input type="tel" value={form.phone} onChange={upd('phone')} placeholder="010-0000-0000" style={inputStyle}
              onFocus={e => e.target.style.borderColor = C.ink}
              onBlur={e => e.target.style.borderColor = C.line} />
          </label>
          <label style={{ display:'flex', flexDirection:'column', gap:6 }}>
            <span style={{ fontSize:12, color:C.muted }}>계좌번호</span>
            <input value={form.account} onChange={upd('account')} placeholder="카카오뱅크 3333-00-0000000" style={inputStyle}
              onFocus={e => e.target.style.borderColor = C.ink}

          {/* SMS notification consent */}
          <div style={{ border:`1px solid ${C.line}`, borderRadius:12, padding:'16px', background:C.surface }}>
            <div style={{ fontSize:13, lineHeight:1.65, color:C.ink, marginBottom:14 }}>
              신청하신 시간대를 바탕으로, 1~2일 내에 최종 확정된 실험 시간 및 안내사항을 문자로 안내드릴 예정입니다. 이에 동의하십니까?
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {choiceBtn(form.smsConsent==='yes', () => setForm({...form, smsConsent:'yes'}), '네, 문자 안내를 받는 것에 동의합니다.')}
              {choiceBtn(false, onWithdraw, '아니요, 문자 안내에 동의하지 않습니다.')}

          </div>

          {/* Research participation consent */}
          <div style={{ border:`1px solid ${C.line}`, borderRadius:12, padding:'16px', background:C.surface }}>
            <div style={{ fontSize:14, fontWeight:500, color:C.ink, marginBottom:4 }}>연구 참여 동의</div>
            <div style={{ fontSize:13, color:C.muted, lineHeight:1.6, marginBottom:14 }}>
              본 연구의 절차·녹음/녹화·개인정보 처리방침을 확인하였으며, 자발적으로 참여에 동의합니다.
            </div>

              {choiceBtn(form.consent==='yes', () => setForm({...form, consent:'yes'}), '동의합니다')}

        </div>
      </div>

// ── BookingApp ────────────────────────────────────────────────────────────────
function BookingApp() {
  const [step,     setStep]     = React.useState('intro');
  const [selected, setSelected] = React.useState([]);
  const [form,     setForm]     = React.useState({ name:'', dob:'', phone:'', account:'', smsConsent:null, consent:null });
  const [readInfo, setReadInfo] = React.useState(false);
  const [avail,    setAvail]    = React.useState(() => buildAvailability(new Set(), new Set(), []));

  const reset = () => {
    setStep('intro'); setSelected([]); setReadInfo(false);
    setForm({ name:'', dob:'', phone:'', account:'', smsConsent:null, consent:null });
  };

  const back = () => {
    const prev = { info:'intro', sessions:'info', details:'sessions' };
    if (prev[step]) setStep(prev[step]);
  };

  const submit = () => {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    apiPost({ action: 'submit', submission: {
      id: `req-${now.getTime()}`,
      name: form.name.trim(),
      dob: form.dob,
      phone: form.phone.trim(),
      account: form.account.trim(),
      pid: '',
      submittedAt: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`,
      status: 'pending',
      sessions: selected.map(s => ({ key: s.key, time: s.time })),
    }});
    setStep('confirm');
  };

  return (
    <div style={{ maxWidth:480, margin:'0 auto', minHeight:'100svh', background:C.bg }}>
      <TopBar step={step} onBack={back} />
      {step === 'intro'    && <Intro onNext={() => setStep('info')} />}
      {step === 'info'     && <StudyInfo readInfo={readInfo} setReadInfo={setReadInfo} onNext={() => setStep('sessions')} />}
      {step === 'sessions' && <Sessions selected={selected} setSelected={setSelected} avail={avail} setAvail={setAvail} onNext={() => setStep('details')} />}
      {step === 'details'   && <Details form={form} setForm={setForm} selected={selected} avail={avail} onNext={submit} onWithdraw={() => setStep('withdrawn')} />}
      {step === 'confirm'   && <Confirm form={form} selected={selected} avail={avail} onReset={reset} />}
      {step === 'withdrawn' && <Withdrawn onReset={reset} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BookingApp />);
</script>
